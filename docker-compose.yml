version: '3.8'

services:
  web_interface:
    build: ./web_server
    ports:
      - "80:8000"
    restart: always

  cloud_agent:
    build: ./agent
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    network_mode: "host" # Rejoint le réseau de la machine hôte
    restart: always

  ros2_simulation:
    build: ./simulation
    container_name: cloud_gz_simulation
    # IMPORTANT : network_mode "host" permet à ROS2 de communiquer nativement 
    # avec l'agent et le Rosbridge sans barrière réseau Docker
    network_mode: "host" 
    environment:
      - ROS_DOMAIN_ID=42
    ipc: host # Optimise la mémoire partagée pour ROS2 et Gazebo
    restart: always